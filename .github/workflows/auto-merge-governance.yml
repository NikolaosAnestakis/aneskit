name: Auto Merge Governance Updates

on:
  pull_request:
    types: [labeled, synchronize, opened]

jobs:
  automerge:
    if: contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest

    steps:
      - name: Check auto-merge safety conditions
        uses: actions/github-script@v7
        id: checks
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map(l => l.name);
            const hasBreaking = labels.includes('breaking');
            const hasAutomerge = labels.includes('automerge');

            const checkRuns = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha
            });

            const statuses = checkRuns.data.check_runs || [];
            const hasChecks = statuses.length > 0;
            const failed = statuses.some(c => c.status === 'completed' && c.conclusion !== 'success');
            const incomplete = statuses.some(c => c.status !== 'completed');

            const prRef = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            const mergeableState = prRef.data.mergeable_state;
            const upToDate = mergeableState === 'clean';

            const allow = hasAutomerge && !hasBreaking && hasChecks && !failed && !incomplete && upToDate;
            core.setOutput('allow', String(allow));
            core.setOutput('failed', String(failed));
            core.setOutput('breaking', String(hasBreaking));
            core.setOutput('up_to_date', String(upToDate));

      - name: Enable auto-merge
        if: steps.checks.outputs.allow == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.graphql(`
              mutation {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: "${pr.node_id}",
                  mergeMethod: SQUASH
                }) { clientMutationId }
              }
            `);
