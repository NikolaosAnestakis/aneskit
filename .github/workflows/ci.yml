name: CI Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Node setup
        id: node_setup
        shell: bash
        run: |
          if [ -f .nvmrc ]; then
            echo "use_nvmrc=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_nvmrc=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node from .nvmrc
        if: steps.node_setup.outputs.use_nvmrc == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Node (fallback)
        if: steps.node_setup.outputs.use_nvmrc == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run release gate (JSON)
        shell: bash
        run: |
          node scripts/release-gate.mjs --json > gate.json || true
          cat gate.json

      - name: Enforce APPROVED status
        shell: bash
        run: |
          STATUS=$(node -e "const fs=require('fs');const g=JSON.parse(fs.readFileSync('gate.json','utf8'));console.log(g.status);")
          CLASSIFICATION=$(node -e "const fs=require('fs');const g=JSON.parse(fs.readFileSync('gate.json','utf8'));console.log(g.classification);")
          echo "classification=${CLASSIFICATION}" >> "$GITHUB_STEP_SUMMARY"
          echo "status=${STATUS}" >> "$GITHUB_STEP_SUMMARY"
          if [ "$STATUS" != "APPROVED" ]; then
            echo "Release gate blocked with status: $STATUS"
            exit 1
          fi
