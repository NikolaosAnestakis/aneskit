name: Automated Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Node setup
        id: node_setup
        shell: bash
        run: |
          if [ -f .nvmrc ]; then
            echo "use_nvmrc=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_nvmrc=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node from .nvmrc
        if: steps.node_setup.outputs.use_nvmrc == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Node (fallback)
        if: steps.node_setup.outputs.use_nvmrc == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run release gate (JSON)
        shell: bash
        run: |
          node scripts/release-gate.mjs --json > gate.json || true
          cat gate.json

      - name: Parse gate result
        id: gate
        shell: bash
        run: |
          STATUS=$(node -e "const fs=require('fs');const g=JSON.parse(fs.readFileSync('gate.json','utf8'));console.log(g.status);")
          CLASSIFICATION=$(node -e "const fs=require('fs');const g=JSON.parse(fs.readFileSync('gate.json','utf8'));console.log(g.classification);")
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "classification=${CLASSIFICATION}" >> "$GITHUB_OUTPUT"
          echo "Detected classification: ${CLASSIFICATION}" >> "$GITHUB_STEP_SUMMARY"
          echo "Gate status: ${STATUS}" >> "$GITHUB_STEP_SUMMARY"

      - name: Stop on blocked gate
        if: steps.gate.outputs.status != 'APPROVED'
        run: |
          echo "Release blocked by gate"
          exit 1

      - name: Stop when no release is needed
        if: steps.gate.outputs.classification == 'NONE'
        run: |
          echo "No release needed"
          echo "release status: APPROVED (no-op)" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure git identity
        if: steps.gate.outputs.classification != 'NONE'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare release commit and tag
        if: steps.gate.outputs.classification != 'NONE'
        run: |
          node scripts/release.mjs --json > release.json
          cat release.json

      - name: Read release metadata
        if: steps.gate.outputs.classification != 'NONE'
        id: release_meta
        run: |
          VERSION=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('release.json','utf8'));console.log(r.version);")
          TAG=$(node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('release.json','utf8'));console.log(r.tag);")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tag
        if: steps.gate.outputs.classification != 'NONE'
        run: git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.gate.outputs.classification != 'NONE'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release_meta.outputs.tag }}" \
            --title "${{ steps.release_meta.outputs.tag }}" \
            --notes-file .release-notes.md

      - name: Verify npm version does not already exist
        if: steps.gate.outputs.classification != 'NONE'
        run: |
          if npm view "aneskit@${{ steps.release_meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "Version already published on npm: ${{ steps.release_meta.outputs.version }}"
            exit 1
          fi

      - name: Publish to npm (OIDC preferred, token fallback)
        if: steps.gate.outputs.classification != 'NONE'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          if npm publish --provenance --access public; then
            echo "Published via OIDC provenance"
          else
            if [ -z "${NPM_TOKEN}" ]; then
              echo "OIDC publish failed and NPM_TOKEN is not configured"
              exit 1
            fi
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
            npm publish --access public
          fi

      - name: Release summary
        if: steps.gate.outputs.classification != 'NONE'
        run: |
          echo "version: ${{ steps.release_meta.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "classification: ${{ steps.gate.outputs.classification }}" >> "$GITHUB_STEP_SUMMARY"
          echo "release status: APPROVED" >> "$GITHUB_STEP_SUMMARY"
          echo "release URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.release_meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "npm package URL: https://www.npmjs.com/package/aneskit" >> "$GITHUB_STEP_SUMMARY"
