<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AnesKit Baseline</title>
    <link rel="stylesheet" href="../dist/aneskit.css" />
  </head>
  <body class="p-4">
    <div class="row">
      <div class="col-6">
        <button class="btn btn-primary">Primary Button</button>
      </div>
      <div class="col-6">
        <button class="btn btn-secondary">Secondary Button</button>
      </div>
    </div>

    <div class="card mt-4 p-4">
      <h3 class="mb-2">Baseline Form</h3>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" id="email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group mt-2">
        <label class="form-label" for="message">Message</label>
        <textarea class="form-textarea" id="message"></textarea>
      </div>
    </div>
  </body>
</html>
